# 1. Crée le fichier simple CORRECTEMENT
cat > .github/workflows/test-simple.yml << 'EOF'
name: Test Label Claude
on:
  issues:
    types: [labeled]
jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'claude'
    steps:
    - uses: actions/checkout@v4
    - run: |
        echo "🎉 SUCCESS ! Ticket #${{ github.event.issue.number }} détecté"
        echo "Lien: ${{ github.event.issue.html_url }}"
EOF